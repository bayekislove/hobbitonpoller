name: Hobbiton Evening Tour Poller

on:
  schedule:
    # Runs every 15 minutes. GitHub's cron is UTC-based and "best effort" —
    # during busy periods a run can be delayed a few minutes, that's normal.
    # Cron format: minute hour day month weekday
    - cron: "*/15 * * * *"
  # Lets you trigger a run manually from the Actions tab, useful for testing.
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run poller (single check across date range)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          START_DATE: ${{ vars.START_DATE }}
          END_DATE: ${{ vars.END_DATE }}
          MIN_TICKETS: ${{ vars.MIN_TICKETS }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
        run: |
          # Shell-level defaults protect against unset/empty repo variables
          # (START_DATE, END_DATE, EMAIL_TO are required — the job fails
          # loudly below if you forgot to set them, rather than crashing
          # obscurely).
          if [ -z "$START_DATE" ]; then
            echo "::error::START_DATE variable is not set (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi
          if [ -z "$END_DATE" ]; then
            echo "::error::END_DATE variable is not set (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi
          if [ -z "$EMAIL_TO" ]; then
            echo "::error::EMAIL_TO variable is not set (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi
          MIN_TICKETS="${MIN_TICKETS:-2}"

          python hobbiton_poller.py \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --min-tickets "$MIN_TICKETS" \
            --email "$EMAIL_TO" \
            --once
